<!DOCTYPE html>
<!-- Jay Patel -->
<!-- COMP 4610 GUI I - HW3 -->
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dynamic Multiplication Table</title>

    <!-- bootstrap css -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.1/css/bootstrap-theme.min.css">

    <!-- my css -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- title -->
    <h1 id="pageTitle">Dynamic Multiplication Table</h1>

    <div class="container">

        <!-- form box -->
        <fieldset id="formBox">
            <legend>Please enter the table ranges</legend>

            <!-- text boxes -->
            <form id="tableForm" role="form">
                <div class="form-group">
                    <label for="minCol">Minimum Column Value (between -50 and 50):</label>
                    <input type="text" class="form-control" id="minCol" placeholder="for example 1">
                </div>
                <div class="form-group">
                    <label for="maxCol">Maximum Column Value (between -50 and 50):</label>
                    <input type="text" class="form-control" id="maxCol" placeholder="for example 10">
                </div>
                <div class="form-group">
                    <label for="minRow">Minimum Row Value (between -50 and 50):</label>
                    <input type="text" class="form-control" id="minRow" placeholder="for example 1">
                </div>
                <div class="form-group">
                    <label for="maxRow">Maximum Row Value (between -50 and 50):</label>
                    <input type="text" class="form-control" id="maxRow" placeholder="for example 10">
                </div>
                <button type="submit" class="btn btn-primary">Generate Table</button>
            </form>
        </fieldset>

        <!-- error mesages -->
        <div id="errorBox"></div>

        <!-- table -->
        <div id="tableArea"></div>

    </div>

    <!-- javascript -->
    <script src="js/table.js"></script>
</body>
</html>
